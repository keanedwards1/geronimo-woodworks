<!DOCTYPE html>

<html lang="en">

<head>

    <!--

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarqueeKit Demo | Basic Marquee</title>
    <link rel="stylesheet" href="/marquee.css">
    <link rel="stylesheet" href="/css/demo.css">
    <link rel="stylesheet" href="/css/fade.css"> <!-- Add this line -->
    <link rel="icon" type="image/png" href="/images/logo.png">

</head>

<body>
    
    <!-- COPY FROM HERE -->
    <div class="marquee-wrapper">
        <h1>MarqueeKit Examples</h1>
        <section class="image-marquee">
            <h2>Load Animation</h2>
            <div id="fade-marquee"></div>
        </section>
    </div>
    <!-- TO HERE -->

    <div class="demo-nav">
        <button onclick="location.href='/index.html'">Basic</button>
        <button onclick="location.href='/html/reverse.html'">Reversed</button>
        <button onclick="location.href='/html/pause-on-hover.html'">Pause On Hover</button>
        <button onclick="location.href='/html/image-scale.html'">Grow</button>
        <button onclick="location.href='/html/animate.html'">On-Load Animations</button>
        <button onclick="location.href='/html/fade.html'">Fade</button>
        <button onclick="location.href='/html/mixed.html'">Mixed</button>
        <button onclick="location.href='/html/wide-images.html'">Wide Images</button>
        <button onclick="location.href='/html/tall-images.html'">Tall Images</button>
    </div>

    <!-- COPY FROM HERE -->
    <script src="/marquee.js"></script>
    <script>
        /**
         * Each instance can have unique settings.
         */

        const images1 = [
            "/images/image1.webp",
            "/images/image2.webp",
            "/images/image3.webp",
            "/images/image4.webp",
        ];

        // Example of basic marquee with default settings
        new MarqueeKit("#fade-marquee", {
            images: images1,
            height: 300,
            imageWidth: 250,
            speed: 50,
            gap: 20,
            reverse: false,
            imageScale: 1,
            pauseOnHover: false,
            borderRadius: 8
        });
    </script>
    <!-- TO HERE -->

</body>

</html>
